# Minimal headscale config for fnOS
# See https://github.com/juanfont/headscale/blob/main/config-example.yaml for full reference

server_url: http://127.0.0.1:8480
listen_addr: 0.0.0.0:8480
metrics_listen_addr: 127.0.0.1:9090

noise:
  private_key_path: /vol1/@appdata/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

database:
  type: sqlite
  sqlite:
    path: /vol1/@appdata/headscale/db.sqlite

dns:
  magic_dns: false
  override_local_dns: false
  nameservers:
    global:
      - 1.1.1.1

derp:
  server:
    enabled: false
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  paths: []
  auto_update_enabled: true
  update_frequency: 3h

log:
  level: info
  format: text

policy:
  mode: file
  path: ""

unix_socket: /vol1/@appdata/headscale/headscale.sock
unix_socket_permission: "0770"

logtail:
  enabled: false
